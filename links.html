<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>BITSTREAM | Links</title>
  <meta http-equiv="refresh" content="0; url=uz/links.html">
  <script>
(function(){
 const saved=localStorage.getItem('theme');
 if(saved==='dark'){document.documentElement.setAttribute('data-theme','dark');}
})();
function toggleTheme(){
 const el=document.documentElement;
 const dark=el.getAttribute('data-theme')==='dark';
 if(dark){el.removeAttribute('data-theme');localStorage.setItem('theme','light');}
 else{el.setAttribute('data-theme','dark');localStorage.setItem('theme','dark');}
 const b=document.getElementById('themeBtn');
 if(b){b.innerHTML=el.getAttribute('data-theme')==='dark'?'☀':'☾';}
}
document.addEventListener('DOMContentLoaded',function(){
 const lang=document.querySelector('[data-lang-select]');
 if(lang && !document.getElementById('themeBtn')){
   const b=document.createElement('button');
   b.id='themeBtn'; b.className='theme-btn';
   b.innerHTML=document.documentElement.getAttribute('data-theme')==='dark'?'☀':'☾';
   b.onclick=toggleTheme;
   lang.parentNode.insertBefore(b,lang);
 }
});
</script></body>
</html>
