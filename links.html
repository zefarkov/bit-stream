<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>BITSTREAM | Links</title>
  <meta http-equiv="refresh" content="0; url=uz/links.html">
  <script>
    (function(){
      var l=(navigator.language||navigator.userLanguage||'uz').toLowerCase();
      var target='uz/links.html';
      if(l.startsWith('ru')) target='ru/links.html';
      else if(l.startsWith('en')) target='en/links.html';
      location.replace(target);
    })();
  </script>
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#dfe7ef;color:#10233e;display:grid;place-items:center;min-height:100vh}
    .card{background:#eef3f7;border-radius:28px;padding:28px;max-width:760px;width:min(92vw,760px)}
    h1{text-align:center;margin:0 0 6px}
    p{text-align:center;color:#5b6b80}
    .links{display:grid;gap:14px;margin-top:20px}
    a{display:flex;justify-content:space-between;align-items:center;background:#fff;padding:18px 20px;border-radius:18px;text-decoration:none;color:#10233e;border:1px solid #d7e0ea}
  </style>
</head>
<body>
  <div class="card">
    <h1>BITSTREAM</h1>
    <p>Choose language</p>
    <div class="links">
      <a href="uz/links.html"><span>O‘zbekcha</span><span>→</span></a>
      <a href="ru/links.html"><span>Русский</span><span>→</span></a>
      <a href="en/links.html"><span>English</span><span>→</span></a>
    </div>
  </div>

<script>
(function(){const t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})();
function toggleTheme(){const e=document.documentElement;const n=e.getAttribute('data-theme')==='dark'?'light':'dark';e.setAttribute('data-theme',n);localStorage.setItem('theme',n);}
</script>
</body>
</html>
