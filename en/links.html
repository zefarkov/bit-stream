<script>
(function(){
  const saved = localStorage.getItem('theme');
  if(saved === 'dark'){
    document.documentElement.setAttribute('data-theme','dark');
  }else if(!saved){
    const h = new Date().getHours();
    if(h >= 22 || h < 6) document.documentElement.setAttribute('data-theme','dark');
  }
})();
</script>
<script>
function updateLogo(){
  const logo = document.getElementById('siteLogo');
  if(!logo) return;

  const dark = document.documentElement.getAttribute('data-theme') === 'dark';

  logo.src = dark
    ? '../assets/img/brand/logo-bitstream-dark.png'
    : '../assets/img/brand/logo-bitstream.png';
}

const oldUpdateThemeIcon = updateThemeIcon;
updateThemeIcon = function(){
  oldUpdateThemeIcon();
  updateLogo();
};

document.addEventListener('DOMContentLoaded', updateLogo);
</script>
