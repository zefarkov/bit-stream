<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>BITSTREAM</title>
  <meta name="description" content="BITSTREAM IT infrastructure website language redirect.">
  <meta http-equiv="refresh" content="0; url=uz/index.html">
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#eef2f7;color:#10233e;display:grid;place-items:center;min-height:100vh}
    .card{background:#fff;border:1px solid #d8e1eb;border-radius:18px;padding:28px;max-width:560px;box-shadow:0 14px 40px rgba(16,35,62,.08)}
    h1{margin:0 0 10px}
    p{color:#5b6b80;line-height:1.55}
    a{display:inline-block;margin:8px 10px 0 0;color:#0b2e59;text-decoration:none;font-weight:700}
  </style>
  

<script>
(function(){
 const saved=localStorage.getItem('theme');
 if(saved){document.documentElement.setAttribute('data-theme',saved);}
 else if(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches){
   document.documentElement.setAttribute('data-theme','dark');
 }
})();
function toggleTheme(){
 const el=document.documentElement;
 const dark=el.getAttribute('data-theme')==='dark';
 const next=dark?'light':'dark';
 el.setAttribute('data-theme',next);
 localStorage.setItem('theme',next);
 const b=document.getElementById('themeFab'); if(b){b.innerHTML=next==='dark'?'☀':'☾';}
}
document.addEventListener('DOMContentLoaded',function(){
 if(!document.getElementById('themeFab')){
   const b=document.createElement('button');
   b.id='themeFab'; b.className='theme-fab';
   const dark=document.documentElement.getAttribute('data-theme')==='dark';
   b.innerHTML=dark?'☀':'☾';
   b.onclick=toggleTheme;
   document.body.appendChild(b);
 }
});
</script>
</body>
</html>
