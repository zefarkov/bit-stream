<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>BITSTREAM</title>
  <meta name="description" content="BITSTREAM IT infrastructure website language redirect.">
  <meta http-equiv="refresh" content="0; url=uz/index.html">
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#eef2f7;color:#10233e;display:grid;place-items:center;min-height:100vh}
    .card{background:#fff;border:1px solid #d8e1eb;border-radius:18px;padding:28px;max-width:560px;box-shadow:0 14px 40px rgba(16,35,62,.08)}
    h1{margin:0 0 10px}
    p{color:#5b6b80;line-height:1.55}
    a{display:inline-block;margin:8px 10px 0 0;color:#0b2e59;text-decoration:none;font-weight:700}
  </style>
  <script>
(function(){
 const saved=localStorage.getItem('theme');
 if(saved==='dark'){document.documentElement.setAttribute('data-theme','dark');}
})();
function toggleTheme(){
 const el=document.documentElement;
 const dark=el.getAttribute('data-theme')==='dark';
 if(dark){el.removeAttribute('data-theme');localStorage.setItem('theme','light');}
 else{el.setAttribute('data-theme','dark');localStorage.setItem('theme','dark');}
 const b=document.getElementById('themeBtn');
 if(b){b.innerHTML=el.getAttribute('data-theme')==='dark'?'☀':'☾';}
}
document.addEventListener('DOMContentLoaded',function(){
 const lang=document.querySelector('[data-lang-select]');
 if(lang && !document.getElementById('themeBtn')){
   const b=document.createElement('button');
   b.id='themeBtn'; b.className='theme-btn';
   b.innerHTML=document.documentElement.getAttribute('data-theme')==='dark'?'☀':'☾';
   b.onclick=toggleTheme;
   lang.parentNode.insertBefore(b,lang);
 }
});
</script></body>
</html>
