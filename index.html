<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>BITSTREAM</title>
  <meta name="description" content="BITSTREAM IT infrastructure website language redirect.">
  <meta http-equiv="refresh" content="0; url=uz/index.html">
<style>
    body{margin:0;font-family:Arial,sans-serif;background:#eef2f7;color:#10233e;display:grid;place-items:center;min-height:100vh}
    .card{background:#fff;border:1px solid #d8e1eb;border-radius:18px;padding:28px;max-width:560px;box-shadow:0 14px 40px rgba(16,35,62,.08)}
    h1{margin:0 0 10px}
    p{color:#5b6b80;line-height:1.55}
    a{display:inline-block;margin:8px 10px 0 0;color:#0b2e59;text-decoration:none;font-weight:700}
  </style>
  <script>
    (function(){
      var l=(navigator.language||navigator.userLanguage||'uz').toLowerCase();
      var target='uz/index.html';
      if(l.startsWith('ru')) target='ru/index.html';
      else if(l.startsWith('en')) target='en/index.html';
      location.replace(target);
    })();
  </script>
<link rel="icon" href="assets/icons/favicon.ico" sizes="any">
</head>
<body>
  <div class="card">
    <h1>BITSTREAM</h1>
    <p>Redirecting to the best language version. Default: Uzbek.</p>
    <a href="uz/index.html">O‘zbekcha</a>
    <a href="ru/index.html">Русский</a>
    <a href="en/index.html">English</a>
  </div>
</body>
</html>
