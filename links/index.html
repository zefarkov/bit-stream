(async function () {
  const cards = {
    "#farrux": "farrux",
    "#abdulaziz": "abdulaziz"
  };

  const hash = location.hash || "";
  const card = cards[hash] || "";

  if (card) {
    try {
      await fetch("https://track.bit-stream.uz/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          eventType: "card",
          card,
          page: location.pathname,
          ref: document.referrer || "",
          ua: navigator.userAgent
        }),
        keepalive: true
      });
    } catch (e) {}
  }

  let target = "../uz/links.html";
  const l = (navigator.language || navigator.userLanguage || "uz").toLowerCase();

  if (l.startsWith("ru")) target = "../ru/links.html";
  else if (l.startsWith("en")) target = "../en/links.html";

  location.replace(target + hash);
})();
</script>
