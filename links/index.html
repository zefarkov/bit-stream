<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="BITSTREAM links landing page.">
<title>BITSTREAM | Links landing</title>
<link rel="icon" href="assets/icons/favicon.svg" sizes="any">

<script>
(async function () {
  const cards = {
    "#farrux": "farrux",
    "#abdulaziz": "abdulaziz"
  };

  const hash = location.hash || "";
  const card = cards[hash] || "";

  if (card) {
    try {
      await fetch("https://track.bit-stream.uz/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          eventType: "card",
          card,
          page: location.pathname,
          ref: document.referrer || "",
          ua: navigator.userAgent
        }),
        keepalive: true
      });
    } catch (e) {}
  }

  let target = "../uz/links.html";
  const l = (navigator.language || navigator.userLanguage || "uz").toLowerCase();

  if (l.startsWith("ru")) target = "../ru/links.html";
  else if (l.startsWith("en")) target = "../en/links.html";

  location.replace(target + hash);
})();
</script>
